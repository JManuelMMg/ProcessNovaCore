{% extends 'base.html' %}
{% block title %}Invitación expirada{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Invitación no válida</h2>
        <p class="text-gray-600">Esta invitación ha expirado o ya fue utilizada. Contacta al administrador de {{ invitation.organization.name }}.</p>
        <a href="{% url 'login' %}" class="inline-block mt-6 text-blue-600 hover:underline">Ir a inicio de sesión</a>
    </div>
</div>
{% endblock %}
