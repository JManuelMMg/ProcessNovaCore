{% extends 'base.html' %}
{% block title %}Nuevo Usuario{% endblock %}
{% block content %}
<div class="mb-8">
    <a href="{% url 'users:user_list' %}" class="text-blue-600">← Volver al equipo</a>
    <h1 class="text-3xl font-bold text-gray-800 mt-4">Crear Usuario</h1>
</div>
<div class="bg-white rounded-xl shadow-md p-8 max-w-lg">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold">Crear Usuario</button>
    </form>
</div>
<script>
document.getElementById('id_role').addEventListener('change', function() {
    const branchField = document.getElementById('id_branch').closest('.mb-4');
    branchField.style.display = this.value === 'admin_central' ? 'none' : 'block';
});
document.getElementById('id_role').dispatchEvent(new Event('change'));
</script>
{% endblock %}
