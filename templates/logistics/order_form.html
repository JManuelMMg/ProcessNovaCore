{% extends 'base.html' %}
{% block title %}{% if editing %}Editar{% else %}Nuevo{% endif %} Pedido - Logística{% endblock %}
{% block content %}
<div class="mb-8">
    <a href="{% url 'logistics:order_list' %}" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold mb-4">← Regresar</a>
    <h1 class="text-3xl font-bold text-gray-800">{% if editing %}Editar{% else %}Nuevo{% endif %} Pedido</h1>
</div>

<div class="bg-white rounded-2xl shadow-md p-6 border border-gray-100">
    <form method="post" id="orderForm">
        {% csrf_token %}
        
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cliente</label>
            <select name="customer" required class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition">
                <option value="">Seleccionar cliente...</option>
                {% for customer in customers %}
                <option value="{{ customer.id }}">{{ customer.name }} {% if customer.email %}({{ customer.email }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-semibold text-gray-700">Productos</label>
                <button type="button" id="addProductBtn" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition font-semibold text-sm">+ Añadir Producto</button>
            </div>
            <div id="productsContainer" class="space-y-3">
                <!-- Aquí se irán añadiendo los productos dinámicamente -->
            </div>
        </div>
        
        <div class="flex gap-3 pt-4 border-t border-gray-100">
            <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold transition">Guardar Pedido</button>
            <a href="{% url 'logistics:order_list' %}" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 font-semibold transition">Cancelar</a>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let productIndex = 0;
    const productsContainer = document.getElementById('productsContainer');
    const addProductBtn = document.getElementById('addProductBtn');
    const products = [{% for product in products %}
        { id: {{ product.id }}, name: "{{ product.name|escapejs }}", price: {{ product.price }} },
    {% endfor %}];
    
    function addProductRow() {
        const row = document.createElement('div');
        row.className = 'flex gap-3 items-end bg-gray-50 p-4 rounded-xl';
        row.innerHTML = `
            <div class="flex-1">
                <label class="block text-xs font-semibold text-gray-600 mb-1">Producto</label>
                <select name="products" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition text-sm">
                    <option value="">Seleccionar...</option>
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.name }} - ${{ product.price|floatformat:2 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="w-32">
                <label class="block text-xs font-semibold text-gray-600 mb-1">Cantidad</label>
                <input type="number" name="quantities" min="1" value="1" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition text-sm">
            </div>
            <button type="button" class="removeProductBtn px-3 py-2 text-red-600 hover:bg-red-100 rounded-lg text-sm font-semibold">×</button>
        `;
        productsContainer.appendChild(row);
        
        row.querySelector('.removeProductBtn').addEventListener('click', function() {
            row.remove();
        });
    }
    
    addProductBtn.addEventListener('click', addProductRow);
    
    // Añadir una fila inicial
    addProductRow();
});
</script>
{% endblock %}
