{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white rounded-xl shadow-md p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-4">
                <svg class="h-8 w-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">{{ title }}</h1>
            <p class="text-gray-600 mt-2">¿Estás seguro de que quieres eliminar "{{ object }}"? Esta acción no se puede deshacer.</p>
        </div>
        
        <form method="POST" class="flex gap-4">
            {% csrf_token %}
            <a href="javascript:history.back()" class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition font-semibold text-center">
                Cancelar
            </a>
            <button type="submit" class="flex-1 px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition font-semibold">
                Eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
