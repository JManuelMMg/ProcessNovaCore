{% extends 'base.html' %}
{% block title %}Entrada de Inventario{% endblock %}
{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Entrada de Inventario</h1>
    <p class="text-gray-600">Escanea productos para agregar stock{% if current_branch %} en {{ current_branch.name }}{% endif %}</p>
</div>
<div class="bg-white rounded-xl shadow-md p-8 max-w-xl">
    <div class="flex gap-2 mb-4">
        <input id="barcode-input" type="text" placeholder="Código de barras..."
            class="flex-1 px-4 py-3 border-2 rounded-xl text-lg" autofocus>
        <button onclick="scanBarcode()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold">Buscar</button>
        <button onclick="toggleCamera()" class="px-4 py-3 bg-gray-700 text-white rounded-xl">📷</button>
    </div>
    <div id="camera-reader" class="hidden mb-4 rounded-xl overflow-hidden"></div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad a ingresar</label>
        <input id="quantity-input" type="number" value="1" min="1" class="w-full px-4 py-2 border rounded-lg">
    </div>
    <div id="result" class="hidden p-4 rounded-lg mb-4"></div>
    <a href="{% url 'inventory:product_create' %}" class="text-blue-600 text-sm">¿Producto nuevo? Crear producto</a>
</div>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const csrfToken = '{{ csrf_token }}';
let scanner = null;

document.getElementById('barcode-input').addEventListener('keypress', e => { if (e.key === 'Enter') scanBarcode(); });

async function toggleCamera() {
    const reader = document.getElementById('camera-reader');
    if (scanner) { await scanner.stop(); scanner = null; reader.classList.add('hidden'); return; }
    reader.classList.remove('hidden');
    scanner = new Html5Qrcode('camera-reader');
    await scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 250, height: 120 } },
        (text) => { document.getElementById('barcode-input').value = text; scanner.stop(); scanner = null; reader.classList.add('hidden'); scanBarcode(); });
}

function scanBarcode() {
    const barcode = document.getElementById('barcode-input').value.trim();
    const quantity = document.getElementById('quantity-input').value;
    if (!barcode) return;
    fetch('/inventory/api/add-stock/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ barcode, quantity: parseInt(quantity) })
    }).then(r => r.json()).then(data => {
        const result = document.getElementById('result');
        result.classList.remove('hidden');
        if (data.success) {
            result.className = 'p-4 rounded-lg mb-4 bg-green-50 text-green-800';
            result.textContent = `✓ ${data.product_name}: nuevo stock = ${data.new_quantity}`;
        } else {
            result.className = 'p-4 rounded-lg mb-4 bg-red-50 text-red-800';
            result.textContent = data.error || 'Producto no encontrado';
        }
        document.getElementById('barcode-input').value = '';
        document.getElementById('barcode-input').focus();
    });
}
</script>
{% endblock %}
