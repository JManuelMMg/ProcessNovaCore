{% extends 'base.html' %}
{% block title %}Nueva Categoría{% endblock %}
{% block content %}
<div class="mb-8">
    <a href="{% url 'inventory:category_list' %}" class="text-blue-600">← Volver a categorías</a>
    <h1 class="text-3xl font-bold text-gray-800 mt-4">Nueva Categoría</h1>
</div>
<div class="bg-white rounded-xl shadow-md p-8 max-w-lg">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold">Guardar Categoría</button>
    </form>
</div>
{% endblock %}
