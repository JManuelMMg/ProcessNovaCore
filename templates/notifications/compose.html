{% extends 'base.html' %}
{% block title %}Redactar correo{% endblock %}
{% block content %}
<div class="mb-8">
    <a href="{% url 'notifications:inbox' %}" class="text-blue-600">← Volver a bandeja</a>
    <h1 class="text-3xl font-bold text-gray-800 mt-4">Redactar correo</h1>
</div>
<div class="bg-white rounded-xl shadow-md p-8 max-w-2xl">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold">Enviar correo</button>
    </form>
</div>
{% endblock %}
