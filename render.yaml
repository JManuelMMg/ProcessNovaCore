services:
  - type: web
    name: processnova-core
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # Set DATABASE_URL in Render dashboard to your Neon connection string.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: contactoisfaj@gmail.com
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "ProcessNova <noreply@processnova.mx>"
      - key: SITE_URL
        value: https://processnovacore.onrender.com
      - key: REDIS_URL
        value: redis://default:AaboAAIgcDFjYjExMWNhYmY1MzA0ODJhYTQxMGY2NTRmNGUxMWZhYQ@full-glowworm-42728.upstash.io:6379
      - key: ALLOWED_HOSTS
        value: processnovacore.onrender.com

